# Used by docker-compose: set MAKE_MCP_CONFIG=/config/docker.config.yaml and mount ./config → /config
server:
  listen_host: "0.0.0.0"
  listen_port: 8080
  debug: true

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

webauthn:
  rp_id: "localhost"
  rp_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"

hosted:
  container_dial_host: "127.0.0.1"
  container_bind_host: "127.0.0.1"
  generated_server_public_host_ip: "127.0.0.1"
  observability_docker_host_alias: "host.docker.internal"
  observability_replace_api_hosts:
    - "127.0.0.1"
    - "::1"
    - "localhost"

urls:
  mcp_hosted_base_url: ""
  mcp_observability_ingest_base_url: ""

paths:
  docs_dir: ""

# Optional: same shape as config.example.yaml — mount env for GROQ_API_KEY, ANTHROPIC_API_KEY, etc.
llm:
  default_provider: groq
  providers:
    groq:
      type: openai_compatible
      base_url: https://api.groq.com/openai/v1
      model: llama-3.3-70b-versatile
      api_key_env: GROQ_API_KEY
      enabled: true
