# Dev/local defaults only — replace before any shared or production cluster.
# Keys: database-url must use the same password as postgres-password.
apiVersion: v1
kind: Secret
metadata:
  name: make-mcp-secrets
  namespace: make-mcp
  labels:
    app.kubernetes.io/name: make-mcp
type: Opaque
stringData:
  postgres-password: "postgres"
  jwt-secret: "k8s-dev-only-change-me"
  # Use the in-cluster Postgres Service DNS (backend reaches postgres without hostNetwork).
  database-url: "postgres://postgres:postgres@postgres.make-mcp.svc.cluster.local:5432/mcp_builder?sslmode=disable"
  # Groq (config llm.providers.groq.api_key_env: GROQ_API_KEY): add key without committing it to git, e.g.
  #   kubectl -n make-mcp patch secret make-mcp-secrets --type merge -p '{"stringData":{"groq-api-key":"YOUR_KEY"}}'
  # then: kubectl -n make-mcp rollout restart deployment/backend
