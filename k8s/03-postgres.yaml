# Postgres as StatefulSet + PVC so data survives pod restarts. Deleting only the StatefulSet leaves the
# PVC (Kubernetes default); use ./scripts/skaffold-dev.sh so Skaffold does not delete the namespace/PVCs on exit.
# Requires a default StorageClass (Docker Desktop / Rancher Desktop / most local clusters). If the claim stays
# Pending, install a provisioner (e.g. rancher local-path) or see comments in skaffold.yaml.
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-hl
  namespace: make-mcp
  labels:
    app.kubernetes.io/name: make-mcp
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: make-mcp
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: make-mcp
  labels:
    app.kubernetes.io/name: make-mcp
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres-hl
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: make-mcp
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: make-mcp
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: mcp_builder
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: make-mcp-secrets
                  key: postgres-password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: make-mcp
          app.kubernetes.io/component: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: make-mcp
  labels:
    app.kubernetes.io/name: make-mcp
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: make-mcp
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
