# Service account for the API to create hosted MCP Pods and Services in-namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: make-mcp-backend
  namespace: make-mcp
  labels:
    app.kubernetes.io/name: make-mcp
    app.kubernetes.io/component: backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: make-mcp-hosted-runtime
  namespace: make-mcp
  labels:
    app.kubernetes.io/name: make-mcp
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: make-mcp-backend-hosted-runtime
  namespace: make-mcp
  labels:
    app.kubernetes.io/name: make-mcp
subjects:
  - kind: ServiceAccount
    name: make-mcp-backend
    namespace: make-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: make-mcp-hosted-runtime
