# Optional OIDC IdP for testing hosted MCP (see docs/keycloak-local-oidc.md):
#   docker compose --profile oidc up -d keycloak
services:
  postgres:
    image: postgres:16-alpine
    container_name: mcp-builder-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcp_builder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mcp-builder-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mcp_builder?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-docker-compose-dev-only-change-me}
      MAKE_MCP_CONFIG: /config/docker.config.yaml
      PORT: "8080"
      DEBUG: "true"
    volumes:
      - ./config:/config:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mcp-builder-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  keycloak:
    profiles:
      - oidc
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: mcp-builder-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8080"
    ports:
      - "8180:8080"
    restart: unless-stopped

volumes:
  postgres_data:
